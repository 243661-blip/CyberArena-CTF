 name: Mirror core-theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
       - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

       - name: Setup SSH for deploy key
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.CORE_THEME_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # Start SSH agent
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519

       - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

       - name: Push subtree
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no"

          git subtree push \
            --prefix="CTFd/themes/core" \
            git@github.com:CTFd/core-theme.git \
            main
